<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - LETS English Review</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script src="debug.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

        /* Auth Gate */
        #admin-auth{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px}
        #admin-auth.hidden{display:none}
        .auth-box{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;text-align:center;animation:auth-in .5s ease-out}
        @keyframes auth-in{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        .auth-box .auth-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px;color:#fff;box-shadow:0 8px 32px rgba(239,68,68,.4)}
        .auth-box h2{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
        .auth-box p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
        .auth-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;text-align:center;letter-spacing:3px;font-weight:600;transition:all .3s}
        .auth-input:focus{outline:none;border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);background:rgba(255,255,255,.1)}
        .auth-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:1px;font-weight:400}
        .auth-input.error{border-color:#ef4444;animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        .auth-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(239,68,68,.3)}
        .auth-btn:hover{box-shadow:0 6px 24px rgba(239,68,68,.5);transform:translateY(-1px)}
        .auth-error-msg{color:#ef4444;font-size:12px;margin-top:10px;min-height:18px;font-weight:500}

        /* Main Layout */
        #app{display:none}
        #app.show{display:block}

        /* Header */
        .admin-header{background:linear-gradient(135deg,#1e293b,#334155);border-bottom:1px solid rgba(255,255,255,.08);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .admin-header .left{display:flex;align-items:center;gap:12px}
        .admin-header .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800}
        .admin-header h1{font-size:18px;font-weight:700;color:#fff}
        .admin-header h1 span{color:#ef4444}
        .btn-logout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
        .btn-logout:hover{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3)}

        /* Stats */
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:24px;max-width:1400px;margin:0 auto}
        .stat-card{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;display:flex;align-items:center;gap:14px;transition:all .3s}
        .stat-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}
        .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
        .stat-icon.total{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff}
        .stat-icon.head{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
        .stat-icon.staff{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
        .stat-card .stat-value{font-size:28px;font-weight:800;color:#fff}
        .stat-card .stat-label{font-size:12px;color:#94a3b8;font-weight:500;margin-top:2px}

        /* Toolbar */
        .toolbar{padding:0 24px 16px;max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
        .filter-group{display:flex;gap:8px}
        .filter-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
        .filter-btn:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
        .filter-btn.active{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border-color:#3b82f6}
        .refresh-btn{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
        .refresh-btn:hover{background:rgba(59,130,246,.2)}

        /* Cards Grid */
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 24px 40px;max-width:1400px;margin:0 auto}
        .feedback-card{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s}
        .feedback-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
        .card-image{width:100%;height:180px;object-fit:cover;border-bottom:1px solid rgba(255,255,255,.08);background:#1e293b;display:flex;align-items:center;justify-content:center;color:#475569;font-size:14px}
        .card-image img{width:100%;height:100%;object-fit:cover}
        .card-body{padding:16px}
        .card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .card-role{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
        .card-role.head{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
        .card-role.staff{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
        .card-role.unknown{background:rgba(255,255,255,.1);color:#94a3b8}
        .card-time{font-size:11px;color:#64748b}
        .card-comment{font-size:14px;color:#cbd5e1;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .card-area{margin-top:10px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:8px;font-size:11px;color:#64748b;font-family:monospace;display:flex;align-items:center;gap:6px}
        .card-actions{margin-top:10px;display:flex;justify-content:flex-end}
        .btn-delete{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}
        .btn-delete:hover{background:rgba(239,68,68,.25);color:#ef4444;border-color:rgba(239,68,68,.4)}
        .btn-delete-detail{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;margin-top:16px;width:100%}
        .btn-delete-detail:hover{background:rgba(239,68,68,.25);color:#ef4444}

        /* Detail Modal */
        .modal-backdrop{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
        .modal-backdrop.show{display:flex}
        .detail-box{background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:20px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:modal-in .3s ease-out}
        @keyframes modal-in{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
        .detail-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
        .detail-header h3{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
        .detail-close{background:rgba(255,255,255,.08);border:none;color:#94a3b8;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .detail-close:hover{background:rgba(239,68,68,.2);color:#ef4444}
        .detail-image{width:100%;max-height:400px;object-fit:contain;background:#0f172a;border-bottom:1px solid rgba(255,255,255,.08)}
        .detail-body{padding:24px}
        .detail-row{margin-bottom:16px}
        .detail-label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .detail-value{font-size:14px;color:#e2e8f0;line-height:1.7;word-break:break-word}
        .detail-value.comment-text{background:rgba(255,255,255,.04);padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
        .detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .detail-meta-item{background:rgba(255,255,255,.04);padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
        .detail-meta-item .label{font-size:11px;color:#64748b;font-weight:600;margin-bottom:4px}
        .detail-meta-item .value{font-size:13px;color:#e2e8f0;font-weight:500}

        /* Loading */
        .loading-state{text-align:center;padding:60px 20px;color:#64748b}
        .loading-state i{font-size:40px;margin-bottom:16px;display:block;color:#3b82f6;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:60px 20px;color:#64748b}
        .empty-state i{font-size:48px;margin-bottom:16px;display:block;color:#334155}
        .empty-state h3{font-size:18px;font-weight:600;color:#94a3b8;margin-bottom:6px}

        /* Scrollbar */
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

        /* Toast */
        #admin-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);z-index:9999;background:#111827;color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px}
        #admin-toast.show{transform:translateX(-50%) translateY(0)}
        #admin-toast.success{background:#059669}
        #admin-toast.error{background:#dc2626}

        /* Confirm Delete Modal */
        .confirm-delete-box{background:#1e293b;border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;text-align:center;animation:modal-in .3s ease-out}
        .confirm-delete-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.1));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#ef4444}
        .confirm-delete-box h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
        .confirm-delete-box p{font-size:13px;color:#94a3b8;margin-bottom:24px}
        .confirm-delete-actions{display:flex;gap:10px;justify-content:center}
        .btn-confirm-cancel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:all .2s}
        .btn-confirm-cancel:hover{background:rgba(255,255,255,.15)}
        .btn-confirm-delete{background:linear-gradient(135deg,#ef4444,#dc2626);border:none;color:#fff;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
        .btn-confirm-delete:hover{box-shadow:0 4px 16px rgba(239,68,68,.4)}
        .btn-confirm-delete:disabled{opacity:.5;cursor:not-allowed}

        @media(max-width:768px){
            .stats-row{grid-template-columns:1fr 1fr;gap:10px;padding:16px}
            .cards-grid{grid-template-columns:1fr;padding:0 16px 40px}
            .toolbar{padding:0 16px 12px}
            .detail-box{max-width:100%;border-radius:16px}
            .detail-meta-grid{grid-template-columns:1fr}
            .admin-header{padding:14px 16px}
            .auth-box{padding:32px 24px}
        }
    </style>
</head>
<body>

    <!-- Auth Gate - Only HEAD -->
    <div id="admin-auth">
        <div class="auth-box">
            <div class="auth-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <h2>Admin Panel</h2>
            <p>Chỉ Head mới được phép truy cập trang này</p>
            <input type="password" class="auth-input" id="admin-code" placeholder="Nhập mã Head..." autocomplete="off">
            <button class="auth-btn" onclick="verifyAdmin()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Truy cập Admin</button>
            <div class="auth-error-msg" id="admin-error"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <div class="admin-header">
            <div class="left">
                <div class="logo"><i class="fa-solid fa-shield-halved"></i></div>
                <h1>Admin <span>Panel</span></h1>
            </div>
            <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon total"><i class="fa-solid fa-comments"></i></div>
                <div>
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Tổng comment</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon head"><i class="fa-solid fa-crown"></i></div>
                <div>
                    <div class="stat-value" id="stat-head">0</div>
                    <div class="stat-label">Từ Head</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon staff"><i class="fa-solid fa-user-tie"></i></div>
                <div>
                    <div class="stat-value" id="stat-staff">0</div>
                    <div class="stat-label">Từ Staff</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)"><i class="fa-solid fa-layer-group"></i> Tất cả</button>
                <button class="filter-btn" data-filter="Head" onclick="setFilter('Head',this)"><i class="fa-solid fa-crown"></i> Head</button>
                <button class="filter-btn" data-filter="Staff" onclick="setFilter('Staff',this)"><i class="fa-solid fa-user-tie"></i> Staff</button>
            </div>
            <button class="refresh-btn" onclick="loadFeedbacks()"><i class="fa-solid fa-arrows-rotate"></i> Làm mới</button>
        </div>

        <div id="cards-container" class="cards-grid"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-backdrop" id="detail-modal">
        <div class="detail-box">
            <div class="detail-header">
                <h3><i class="fa-solid fa-magnifying-glass" style="color:#3b82f6"></i> Chi tiết feedback</h3>
                <button class="detail-close" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <img class="detail-image" id="detail-img" alt="Screenshot">
            <div class="detail-body">
                <div class="detail-row">
                    <div class="detail-label"><i class="fa-solid fa-comment-dots"></i> Nội dung yêu cầu</div>
                    <div class="detail-value comment-text" id="detail-comment"></div>
                </div>
                <div class="detail-meta-grid">
                    <div class="detail-meta-item">
                        <div class="label"><i class="fa-solid fa-user-shield"></i> Vai trò</div>
                        <div class="value" id="detail-role"></div>
                    </div>
                    <div class="detail-meta-item">
                        <div class="label"><i class="fa-regular fa-clock"></i> Thời gian</div>
                        <div class="value" id="detail-time"></div>
                    </div>
                    <div class="detail-meta-item">
                        <div class="label"><i class="fa-solid fa-vector-square"></i> Vùng chọn</div>
                        <div class="value" id="detail-area" style="font-family:monospace;font-size:12px"></div>
                    </div>
                    <div class="detail-meta-item">
                        <div class="label"><i class="fa-solid fa-fingerprint"></i> ID</div>
                        <div class="value" id="detail-id" style="font-family:monospace;font-size:12px"></div>
                    </div>
                </div>
                <button class="btn-delete-detail" id="detail-delete-btn" onclick="confirmDelete()"><i class="fa-solid fa-trash-can"></i> Xoá comment này</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-backdrop" id="confirm-delete-modal">
        <div class="confirm-delete-box">
            <div class="confirm-delete-icon"><i class="fa-solid fa-trash-can"></i></div>
            <h3>Xoá comment này?</h3>
            <p>Hành động này không thể hoàn tác. Ảnh và dữ liệu sẽ bị xoá vĩnh viễn.</p>
            <div class="confirm-delete-actions">
                <button class="btn-confirm-cancel" onclick="closeConfirmDelete()"><i class="fa-solid fa-arrow-left"></i> Huỷ</button>
                <button class="btn-confirm-delete" id="btn-exec-delete" onclick="executeDelete()"><i class="fa-solid fa-trash-can"></i> Xoá</button>
            </div>
        </div>
    </div>

    <div id="admin-toast"></div>

<script>
// ═══ Config from shared config.js ═══
const WORKER_URL = APP_CONFIG.workerUrl;
const ADMIN_CODE = APP_CONFIG.adminCode;

Logger.log('Admin', 'Admin Panel initialized');

let allFeedbacks = [];
let currentFilter = 'all';

// ═══ Auth ═══
function verifyAdmin() {
    const input = document.getElementById('admin-code');
    const code = input.value.trim();
    Logger.log('Auth', 'Admin auth attempt...');
    if (code === ADMIN_CODE) {
        sessionStorage.setItem('admin_auth', 'true');
        document.getElementById('admin-auth').classList.add('hidden');
        document.getElementById('app').classList.add('show');
        Logger.success('Auth', 'Admin authenticated');
        loadFeedbacks();
    } else {
        input.classList.add('error');
        document.getElementById('admin-error').textContent = 'Mã không hợp lệ. Chỉ Head mới có quyền truy cập.';
        setTimeout(() => input.classList.remove('error'), 500);
        Logger.warn('Auth', 'Invalid admin code attempt');
    }
}
function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
}
// Check session
(function() {
    if (sessionStorage.getItem('admin_auth') === 'true') {
        document.getElementById('admin-auth').classList.add('hidden');
        document.getElementById('app').classList.add('show');
        loadFeedbacks();
    }
})();
document.getElementById('admin-code').addEventListener('keydown', e => { if (e.key === 'Enter') verifyAdmin(); });

// ═══ Load Feedbacks ═══
async function loadFeedbacks() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '<div class="loading-state"><i class="fa-solid fa-spinner"></i><p>Đang tải dữ liệu...</p></div>';
    Logger.time('loadFeedbacks');
    Logger.log('Data', 'Loading feedbacks...');

    try {
        const res = await fetch(WORKER_URL + '/list');
        if (!res.ok) throw new Error('Server ' + res.status);
        const data = await res.json();
        allFeedbacks = data.feedbacks || [];
        Logger.timeEnd('loadFeedbacks', 'Data');
        Logger.success('Data', `Loaded ${allFeedbacks.length} feedbacks (Head: ${allFeedbacks.filter(f=>f.role==='Head').length}, Staff: ${allFeedbacks.filter(f=>f.role==='Staff').length})`);
        updateStats();
        renderCards();
    } catch (err) {
        Logger.timeEnd('loadFeedbacks', 'Data');
        Logger.error('Data', `Load failed: ${err.message}`);
        container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><h3>Lỗi tải dữ liệu</h3><p>${err.message}</p></div>`;
    }
}

// ═══ Stats ═══
function updateStats() {
    document.getElementById('stat-total').textContent = allFeedbacks.length;
    document.getElementById('stat-head').textContent = allFeedbacks.filter(f => f.role === 'Head').length;
    document.getElementById('stat-staff').textContent = allFeedbacks.filter(f => f.role === 'Staff').length;
}

// ═══ Filter ═══
function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
}

// ═══ Render Cards ═══
function renderCards() {
    const container = document.getElementById('cards-container');
    let filtered = allFeedbacks;
    if (currentFilter !== 'all') {
        filtered = allFeedbacks.filter(f => f.role === currentFilter);
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-comment-dots"></i><h3>Chưa có feedback nào</h3><p>Các comment sẽ xuất hiện ở đây</p></div>';
        return;
    }

    container.innerHTML = filtered.map((fb, i) => {
        const role = fb.role || 'Unknown';
        const roleClass = role.toLowerCase();
        const time = fb.timestamp ? new Date(fb.timestamp).toLocaleString('vi-VN') : 'N/A';
        const imageUrl = fb.image_key ? WORKER_URL + '/image/' + fb.image_key : '';
        const area = fb.selected_area ? `x:${fb.selected_area.xPct?.toFixed(1)}% y:${fb.selected_area.yPct?.toFixed(1)}%` : 'N/A';

        return `
            <div class="feedback-card" onclick="showDetail(${i})">
                <div class="card-image">
                    ${imageUrl ? `<img src="${imageUrl}" alt="Screenshot" loading="lazy" onerror="this.parentElement.innerHTML='<i class=\\'fa-regular fa-image\\'></i> Không tải được ảnh'">` : '<i class="fa-regular fa-image"></i> Không có ảnh'}
                </div>
                <div class="card-body">
                    <div class="card-meta">
                        <span class="card-role ${roleClass}"><i class="fa-solid fa-${role==='Head'?'crown':'user-tie'}"></i> ${role}</span>
                        <span class="card-time"><i class="fa-regular fa-clock"></i> ${time}</span>
                    </div>
                    <div class="card-comment">${escapeHtml(fb.comment || 'Không có nội dung')}</div>
                    <div class="card-area"><i class="fa-solid fa-vector-square"></i> ${area}</div>
                    <div class="card-actions">
                        <button class="btn-delete" onclick="event.stopPropagation(); pendingDeleteId='${fb.id}'; document.getElementById('confirm-delete-modal').classList.add('show')"><i class="fa-solid fa-trash-can"></i> Xoá</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// ═══ Detail Modal ═══
function showDetail(index) {
    let filtered = allFeedbacks;
    if (currentFilter !== 'all') {
        filtered = allFeedbacks.filter(f => f.role === currentFilter);
    }
    const fb = filtered[index];
    if (!fb) return;

    const imgUrl = fb.image_key ? WORKER_URL + '/image/' + fb.image_key : '';
    document.getElementById('detail-img').src = imgUrl;
    document.getElementById('detail-img').style.display = imgUrl ? 'block' : 'none';
    document.getElementById('detail-comment').textContent = fb.comment || 'Không có nội dung';
    document.getElementById('detail-role').textContent = fb.role || 'Unknown';
    document.getElementById('detail-time').textContent = fb.timestamp ? new Date(fb.timestamp).toLocaleString('vi-VN') : 'N/A';
    document.getElementById('detail-id').textContent = fb.id || 'N/A';

    const area = fb.selected_area;
    if (area) {
        document.getElementById('detail-area').textContent = `x:${area.xPct?.toFixed(1)}% y:${area.yPct?.toFixed(1)}% w:${area.wPct?.toFixed(1)}% h:${area.hPct?.toFixed(1)}%`;
    } else {
        document.getElementById('detail-area').textContent = 'N/A';
    }

    document.getElementById('detail-modal').classList.add('show');
    currentDetailFb = fb;
}
function closeDetail() {
    document.getElementById('detail-modal').classList.remove('show');
    currentDetailFb = null;
}

// ═══ Delete ═══
let pendingDeleteId = null;
let currentDetailFb = null;

function confirmDelete() {
    if (currentDetailFb) {
        pendingDeleteId = currentDetailFb.id;
    }
    document.getElementById('confirm-delete-modal').classList.add('show');
}
function closeConfirmDelete() {
    document.getElementById('confirm-delete-modal').classList.remove('show');
    pendingDeleteId = null;
}
async function executeDelete() {
    if (!pendingDeleteId) return;
    const btn = document.getElementById('btn-exec-delete');
    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></span> Đang xoá...';
    Logger.log('Delete', `Deleting feedback: ${pendingDeleteId}`);
    try {
        const res = await fetch(WORKER_URL + '/delete/' + pendingDeleteId, { method: 'DELETE' });
        if (!res.ok) throw new Error('Server ' + res.status);
        Logger.success('Delete', `Deleted feedback: ${pendingDeleteId}`);
        closeConfirmDelete();
        closeDetail();
        showToast('admin-toast', 'Đã xoá comment thành công!', 'success');
        loadFeedbacks();
    } catch (err) {
        Logger.error('Delete', `Delete failed: ${err.message}`);
        showToast('admin-toast', 'Lỗi xoá: ' + err.message, 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-trash-can"></i> Xoá';
    pendingDeleteId = null;
}
function showAdminToast(msg, type='success') {
    const toast = document.getElementById('admin-toast');
    toast.textContent = '';
    const ic = document.createElement('i');
    ic.className = type==='success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
    toast.appendChild(ic);
    toast.appendChild(document.createTextNode(' ' + msg));
    toast.className = 'show ' + type;
    setTimeout(() => { toast.className = ''; }, 3500);
}

// ═══ Helpers (escapeHtml and showToast from config.js) ═══
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
});

</script>
